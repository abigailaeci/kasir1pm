<div className="p-8 space-y-6 overflow-y-auto flex-grow">
    <div className="space-y-4">
        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Uang Diterima</label>
        <div className="relative">
            <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-slate-300">Rp</span>
            <input 
                type="number"
                autoFocus
                className="w-full pl-16 pr-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black text-2xl text-slate-800 outline-none focus:border-orange-500 transition-all"
                value={cashReceived}
                onChange={(e) => setCashReceived(e.target.value)}
            />
        </div>

        <div className="grid grid-cols-3 gap-2">
            {[10000, 20000, 50000, 100000].map(val => (
                <button 
                    key={val} 
                    onClick={() => setCashReceived(val.toString())} 
                    className="py-3 bg-slate-100 rounded-xl text-[10px] font-black text-slate-600 hover:bg-slate-200"
                >
                    {(val/1000)}k
                </button>
            ))}
            <button 
                onClick={() => setCashReceived(totalPrice.toString())} 
                className="col-span-2 py-3 bg-orange-100 rounded-xl text-[10px] font-black text-orange-600 hover:bg-orange-200"
            >
                Uang Pas
            </button>
        </div>
    </div>

    <div className="space-y-3 pt-4 border-t border-slate-100">
        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Rangkuman Pesanan</label>
        {cartItems.map((item) => (
            <div key={item.id} className="flex justify-between items-center text-sm">
                <span className="font-bold text-slate-600">{item.qty}x {item.name}</span>
                <span className="font-black text-slate-400">{formatIDR(item.subtotal)}</span>
            </div>
        ))}
    </div>
    
    <div className={`p-6 rounded-[2rem] border-2 transition-all ${changeAmount < 0 ? 'bg-red-50 border-red-100' : 'bg-green-50 border-green-100'}`}>
        <div className="flex justify-between items-center">
            <span className="font-black text-slate-400 text-[10px] uppercase tracking-widest">{changeAmount < 0 ? 'Kurang' : 'Kembalian'}</span>
            <span className={`text-2xl font-black ${changeAmount < 0 ? 'text-red-600' : 'text-green-600'}`}>{formatIDR(Math.abs(changeAmount))}</span>
        </div>
    </div>
</div>
