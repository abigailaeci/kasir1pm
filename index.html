<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danusan 1PM - Mode Bazaar Batch 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-top { padding-top: max(1rem, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-900 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsLQdKuvGVEph8X6__69JIOciTbiib6GkbziUgGb_Zj9hgED1rb0xxZl24y-xG5z12/exec";

        const MENU_DATA = [
            // MAKANAN
            { id: 1, name: "Nasi Bakar", price: 15000, category: "Makanan" },
            { id: 2, name: "Nasi Kulit Geprek", price: 15000, category: "Makanan" },
            { id: 3, name: "Nasi Babi Kecap", price: 20000, category: "Makanan" },
            { id: 4, name: "Nasi Ayam Geprek", price: 15000, category: "Makanan" },
            { id: 5, name: "Nasi Sup Bunga Matahari", price: 15000, category: "Makanan" },
            { id: 6, name: "Batagor", price: 20000, category: "Makanan" },
            
            // SNACK (Update Satuan @5000)
            { id: 7, name: "Tahu Bakso", price: 4000, category: "Snack" },
            { id: 8, name: "Risoles Ragout Ayam", price: 5000, category: "Snack" },
            { id: 9, name: "Pastel", price: 5000, category: "Snack" },
            { id: 10, name: "Onde onde", price: 5000, category: "Snack" },
            { id: 11, name: "Siomay Basah", price: 7000, category: "Snack" },
            { id: 12, name: "Siomay Goreng", price: 7000, category: "Snack" },
            { id: 13, name: "Lupis Ketan Putih", price: 13000, category: "Snack" },
            { id: 14, name: "Lupis Ketan Item", price: 13000, category: "Snack" },
            { id: 15, name: "Salad Buah", price: 15000, category: "Snack" },
            
            // MINUMAN
            { id: 16, name: "Jus Jambu", price: 10000, category: "Minuman" },
            { id: 17, name: "Jus Kedondong", price: 13000, category: "Minuman" },
            { id: 18, name: "Chocolate", price: 15000, category: "Minuman" },
            { id: 19, name: "Milk Tea", price: 15000, category: "Minuman" },
            { id: 20, name: "Peach Tea", price: 12000, category: "Minuman" },
            { id: 21, name: "Beras Kencur Kunir asem", price: 10000, category: "Minuman" },
        ];

        function App() {
            const [userName, setUserName] = useState("");
            const [isStarted, setIsStarted] = useState(false);
            const [cart, setCart] = useState({});
            const [showSummary, setShowSummary] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [cashReceived, setCashReceived] = useState("");

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isStarted, showSummary, cart]);

            const updateQuantity = (id, delta) => {
                setCart(prev => {
                    const currentQty = prev[id] || 0;
                    const newQty = Math.max(0, currentQty + delta);
                    if (newQty === 0) {
                        const { [id]: _, ...rest } = prev;
                        return rest;
                    }
                    return { ...prev, [id]: newQty };
                });
            };

            const cartItems = useMemo(() => {
                return Object.entries(cart).map(([id, qty]) => {
                    const item = MENU_DATA.find(m => m.id === parseInt(id));
                    return { ...item, qty, subtotal: item.price * qty };
                });
            }, [cart]);

            const totalPrice = cartItems.reduce((sum, item) => sum + item.subtotal, 0);
            const changeAmount = useMemo(() => {
                const cash = parseInt(cashReceived) || 0;
                return cash > 0 ? cash - totalPrice : 0;
            }, [cashReceived, totalPrice]);

            const formatIDR = (num) => "Rp " + num.toLocaleString('id-ID');

            const resetOrder = () => {
                setCart({});
                setCashReceived("");
                setShowSummary(false);
            };

            const sendToSpreadsheet = async () => {
                setIsSubmitting(true);
                const itemsPayload = {};
                cartItems.forEach(item => { itemsPayload[item.name] = item.qty; });

                const payload = {
                    nama: userName,
                    total: totalPrice,
                    pembayaran: parseInt(cashReceived) || 0,
                    kembalian: changeAmount,
                    items: itemsPayload,
                    minggu: "Bazaar Batch 4"
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    resetOrder();
                    alert("Berhasil dicatat ke Batch 4!");
                } catch (e) {
                    console.error("Gagal mengirim pesanan.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (!isStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl space-y-8 text-center border-t-[10px] border-orange-500">
                            <div>
                                <span className="bg-orange-100 text-orange-600 px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.3em]">Batch 4</span>
                                <h1 className="text-4xl font-black text-slate-800 tracking-tighter mt-6 uppercase">Kasir 1PM</h1>
                                <p className="text-slate-400 font-bold text-xs mt-2 uppercase tracking-widest leading-loose">Selamat Jualan!</p>
                            </div>
                            
                            <div className="space-y-3">
                                <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest text-left ml-2">Pilih Petugas:</p>
                                <div className="grid grid-cols-1 gap-3">
                                    {["Petugas 1", "Petugas 2", "Petugas 3"].map(name => (
                                        <button 
                                            key={name}
                                            onClick={() => {
                                                setUserName(name);
                                                setIsStarted(true);
                                            }}
                                            className="w-full py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 hover:border-orange-400 hover:bg-orange-50 transition-all flex items-center justify-start px-6 gap-4"
                                        >
                                            <div className="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-xs font-black">{name.split(' ')[1]}</div>
                                            {name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen bg-slate-50">
                    <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-30 p-5 safe-top">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tighter uppercase">DANUSAN <span className="text-orange-600">1PM</span></h1>
                                <p className="text-[10px] font-black text-slate-400 uppercase mt-0.5 tracking-widest">👤 {userName} | BATCH 4</p>
                            </div>
                            <button onClick={() => { if(confirm('Tutup sesi kasir?')) setIsStarted(false) }} className="text-slate-400 p-2 hover:text-red-500 transition-colors">
                                <i data-lucide="log-out" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow max-w-2xl mx-auto w-full p-4 space-y-10 pb-44">
                        {["Makanan", "Snack", "Minuman"].map(category => (
                            <div key={category} className="space-y-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-2 h-5 bg-orange-500 rounded-full"></div>
                                    <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em]">{category}</h2>
                                </div>
                                <div className="grid gap-3">
                                    {MENU_DATA.filter(i => i.category === category).map((item) => (
                                        <div key={item.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center transition-all">
                                            <div className="flex-1 pr-4">
                                                <h3 className="font-bold text-slate-800 text-sm leading-snug">{item.name}</h3>
                                                <p className="text-xs font-black text-orange-500 mt-1">{formatIDR(item.price)}</p>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {cart[item.id] > 0 ? (
                                                    <div className="flex items-center bg-slate-900 rounded-2xl p-1.5 shadow-lg">
                                                        <button onClick={() => updateQuantity(item.id, -1)} className="w-9 h-9 flex items-center justify-center bg-white/10 rounded-xl text-white"><i data-lucide="minus" className="w-4 h-4"></i></button>
                                                        <span className="w-10 text-center font-black text-white">{cart[item.id]}</span>
                                                        <button onClick={() => updateQuantity(item.id, 1)} className="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-slate-900 shadow-md"><i data-lucide="plus" className="w-4 h-4"></i></button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => updateQuantity(item.id, 1)} className="bg-slate-50 text-slate-400 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:bg-slate-100 transition-all active:scale-95">Pilih</button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    {totalPrice > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 p-5 bg-white/90 backdrop-blur-xl border-t z-40 safe-bottom">
                            <div className="max-w-2xl mx-auto flex items-center justify-between gap-6">
                                <div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Total</p>
                                    <p className="text-2xl font-black text-slate-900">{formatIDR(totalPrice)}</p>
                                </div>
                                <button onClick={() => setShowSummary(true)} className="flex-1 bg-orange-600 text-white py-5 rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-orange-200 active:scale-95 transition-all">Bayar</button>
                            </div>
                        </div>
                    )}

                    {showSummary && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={() => !isSubmitting && setShowSummary(false)} />
                            <div className="relative bg-white w-full max-w-md rounded-[3rem] overflow-hidden flex flex-col max-h-[90vh] shadow-2xl border-t-8 border-slate-900">
                                <div className="p-8 text-center border-b bg-slate-50">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">Pembayaran</h2>
                                    <p className="text-xs font-bold text-orange-600 mt-1 uppercase tracking-widest">Total: {formatIDR(totalPrice)}</p>
                                </div>
                                
                                <div className="p-8 space-y-6 overflow-y-auto flex-grow">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Uang Diterima</label>
                                        <div className="relative">
                                            <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-slate-300">Rp</span>
                                            <input 
                                                type="number"
                                                autoFocus
                                                placeholder="0"
                                                className="w-full pl-16 pr-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black text-2xl text-slate-800 outline-none focus:border-orange-500 focus:bg-white transition-all"
                                                value={cashReceived}
                                                onChange={(e) => setCashReceived(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className={`p-6 rounded-[2rem] border-2 transition-all ${changeAmount < 0 ? 'bg-red-50 border-red-100' : 'bg-green-50 border-green-100'}`}>
                                        <div className="flex justify-between items-center">
                                            <span className="font-black text-slate-400 text-[10px] uppercase tracking-widest">{changeAmount < 0 ? 'Kurang' : 'Kembalian'}</span>
                                            <span className={`text-2xl font-black ${changeAmount < 0 ? 'text-red-600' : 'text-green-600'}`}>{formatIDR(Math.abs(changeAmount))}</span>
                                        </div>
                                    </div>

                                    <div className="space-y-3 pt-4 border-t border-slate-100">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Detail Item</label>
                                        {cartItems.map((item) => (
                                            <div key={item.id} className="flex justify-between items-center text-sm">
                                                <span className="font-bold text-slate-600">{item.qty}x {item.name}</span>
                                                <span className="font-black text-slate-400">{formatIDR(item.subtotal)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="p-8 pt-2 grid grid-cols-2 gap-4 bg-white border-t">
                                    <button onClick={() => setShowSummary(false)} className="py-5 bg-white border-2 border-slate-100 text-slate-400 font-black rounded-3xl text-[10px] uppercase tracking-widest hover:bg-slate-50">Batal</button>
                                    <button 
                                        onClick={sendToSpreadsheet} 
                                        disabled={isSubmitting || changeAmount < 0 || !cashReceived} 
                                        className="py-5 bg-slate-900 text-white font-black rounded-3xl text-[10px] uppercase tracking-[0.2em] active:scale-95 transition-all flex justify-center items-center gap-2 disabled:opacity-20"
                                    >
                                        {isSubmitting ? "Mencatat..." : "Selesai"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
